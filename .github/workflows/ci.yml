name: CI

on:
  push:
    paths:
      - '*.c'
      - 'Makefile'
      - '.github/workflows/*'

  release:
    types:
      - created

  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt install libcjson-dev pkgconf

      - name: Build
        run: |
          make

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tdp
          path: tdp
